name: Build Docker Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-website .

      - name: Show images
        run: docker images
