name: CI-CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm test

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - run: docker build -t myapp .

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - run: echo "Deploying..."
